name: Daily DveDeti Check
on:
  schedule:
    - cron: '0 6 * * *'  # Каждый день в 6 утра по UTC
  workflow_dispatch:     # Ручной запуск кнопкой

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - run: pip install requests pandas openpyxl gspread oauth2client
      
      - run: python feed_checker.py
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS }}
      
      - name: Upload Excel report
        uses: actions/upload-artifact@v4
        with:
          name: inventory-report
          path: DVEDETI_INVENTORY_*.xlsx
      
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add inventory_previous.csv || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update inventory $(date +%Y-%m-%d)"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
